name: Model CI (Train, Test, Report)

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies via uv
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          $HOME/.local/bin/uv sync

      - name: Lint (flake8)
        run: uv run flake8 . --exclude=.venv,venv,mlruns,data --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Format check (black)
        run: uv run black . --check

      - name: Run DVC pipeline (Download, Prepare, Train, Test)
        env:
          CI: "true"
          F1_THRESHOLD: "0.75"
        run: uv run mlflow server --host 127.0.0.1 --port 5000 & uv run dvc repro

      - name: Generate Baseline Comparison (PR only)
        if: github.event_name == 'pull_request'
        run: uv run python src/compare_metrics.py

      - name: Setup CML
        if: github.event_name == 'pull_request'
        uses: iterative/setup-cml@v2

      - name: Create CML report (PR only)
        if: github.event_name == 'pull_request'
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          F1_THRESHOLD: "0.75"
        run: |
          cat <<EOF > report.md
          ## Model Metrics
          
          \`\`\`json
          $(cat reports/metrics.json)
          \`\`\`
          
          ## Visualization
          $(cml publish reports/confusion_matrix.png --md)
          
          ### Quality Gate
          F1 threshold target: $F1_THRESHOLD
          EOF
          
          cml comment create report.md

      - name: Upload model artifact (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: production-model
          path: models/model.pkl