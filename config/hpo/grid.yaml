sampler: "grid"
n_trials: 20
metric: "f1"
direction: "maximize"

search_space:
  tfidf:
    max_features: [1000, 3000, 5000, 7000, 9000, 10000, 11000, 12000, 13000, 14000, 15000, 16000, 17000, 18000, 19000, 20000]
    ngram_range: ["1,1", "1,2"]
  logistic_regression:
    C: [0.01, 0.1, 1.0, 10.0]
  random_forest:
    n_estimators: [50, 100, 200]
    max_depth: [5, 10, 15]