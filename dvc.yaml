stages:
  download:
    cmd: uv run src/download.py
    deps:
      - src/download.py
    outs:
      - data/raw/dataset.csv

  prepare:
    cmd: uv run src/prepare.py data/raw/dataset.csv data/processed
    deps:
      - data/raw/dataset.csv
      - src/prepare.py
    outs:
      - data/processed

  test_data:
    cmd: uv run pytest tests/test_data.py -v
    deps:
      - data/processed
      - tests/test_data.py

  optimize:
    cmd: uv run src/optimize.py 
    deps:
      - data/processed
      - src/optimize.py
      - config/
    outs:
      - models/model.pkl
      - reports/metrics.json
      - reports/confusion_matrix.png

  test_model:
    cmd: uv run pytest tests/test_model.py -v
    deps:
      - models/model.pkl
      - reports/metrics.json
      - tests/test_model.py